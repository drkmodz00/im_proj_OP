<div class="modal fade" id="addUnitModal" tabindex="-1">

    <div class="modal-dialog ">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title fw-bold">
                    Add Unit

                </h5>

                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <form method="POST" action="{% url 'add_unit' %}">
                    {% csrf_token %}

                    <input type="hidden" name="room_id" value="{{ room.id }}">

                    <div class="mb-3">
                        <label class="form-label fw-semibold w-50">Asset Tag</label>
                        <input type="text" name="asset_tag" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Status</label>
                        <select name="status" class="form-select">
                            <option value="Working">Working</option>
                            <option value="Defective">Defective</option>
                            <option value="Maintenance">Maintenance</option>
                        </select>
                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            CPU
                        </label>

                        <input type="text"
                        name="cpu"
                        class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            RAM
                        </label>

                        <input type="text"
                        name="ram"
                        class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            GPU
                        </label>

                        <input type="text"
                        name="gpu"
                        class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Storage
                        </label>

                        <input type="text"
                        name="storage"
                        class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Operating System
                        </label>

                        <input type="text"
                        name="os"
                        class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Installed Apps
                        </label>

                        <input type="text"
                        name="installed_apps"
                        class="form-control">

                    </div>

                    <button class="btn btn-primary w-100">

                        <!-- plus icon -->
                        <svg xmlns="http://www.w3.org/2000/svg"
                        width="16" height="16"
                        fill="currentColor"
                        class="me-1"
                        viewBox="0 0 16 16">

                        <path d="M8 1v14M1 8h14"/>

                        </svg>

                        Add Unit

                    </button>

                </form>

            </div>

        </div>

    </div>

</div> 

<div class="modal fade" id="deleteLabModal" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title fw-bold">

                    Delete Laboratory

                </h5>

                <button class="btn-close" data-bs-dismiss="modal"></button>

            </div>


            <div class="modal-body">

                <form method="POST" id="deleteForm">
                    {% csrf_token %}

                    <p>Are you sure you want to delete this laboratory?</p>

                    <div class="d-flex justify-content-end gap-2">

                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            Cancel
                        </button>

                        <button 
                            type="submit"
                            class="btn btn-sm btn-outline-danger delete-btn"
                            data-unit-id="{{ unit.id }}"
                            data-bs-toggle="modal"
                            data-bs-target="#deleteUnitModal">
                            Delete
                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.delete-btn').forEach(button => {
            button.addEventListener('click', function () {
                const unitId = this.getAttribute('data-unit-id');

                if (unitId) {
                    const form = document.getElementById('deleteForm');
                    form.action = `/delete-unit/${unitId}/`;
                }
            });
        });
    });
</script>
