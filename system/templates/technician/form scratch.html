{% extends "base.html" %}
{% block content %}

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-body">

            <h5 class="fw-bold mb-4">Equipment Inspection Form</h5>
            <!-- LAB SELECTION FORM (GET) -->
            <form method="GET" class="mb-3">
                <label class="form-label fw-semibold">Lab Selection</label>
                <select name="lab" class="form-select" onchange="this.form.submit()">
                    <option value="" disabled selected>-- Select Lab --</option>
                    {% for room in rooms %}
                        <option value="{{ room.id }}" {% if room.id == selected_lab_id %}selected{% endif %}>
                            {{ room.room_name }} - {{ room.location }}
                        </option>
                    {% endfor %}
                </select>
            </form>

            {% if selected_lab_id %}
            <form method="POST">
                {% csrf_token %}

                <input type="hidden" name="room" value="{{ selected_lab_id }}">

                <!-- PERIOD -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Assessment Period</label>
                    <select name="period_id" class="form-select" required>
                        <option value="" disabled selected>-- Select Period --</option>
                        {% for period in periods %}
                            <option value="{{ period.id }}">
                                {{ period.semester }} {{ period.school_year }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- UNIT -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Unit / Serial Number</label>
                    <select name="unit_id" class="form-select">
                        {% for unit in units %}
                            <option value="{{ unit.id }}">{{ unit.asset_tag }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- EQUIPMENT -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Equipment</label>
                    <select name="equipment_id" class="form-select" required>
                        <option value="" disabled selected>-- Select Equipment --</option>
                        {% for equip in equipments %}
                            <option value="{{ equip.id }}">
                                {{ equip.unit.asset_tag }} - {{ equip.device_type }}
                                ({{ equip.brand }} {{ equip.model }})
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- CONDITION -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Condition</label>
                    <select name="condition" class="form-select" required>
                        <option value="Good">Good</option>
                        <option value="Damaged">Damaged</option>
                        <option value="Replacement Needed">Replacement Needed</option>
                    </select>
                </div>

                <!-- NOTES -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Inspection Notes</label>
                    <textarea name="remarks" class="form-control"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Submit Inspection</button>
            </form>
            {% endif %}
        </div>
    </div>
</div>

{% endblock %}
