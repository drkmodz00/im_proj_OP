<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab-Tech OS | Monochrome</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --sidebar-width: 260px; }
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; color: #1a1a1a; }
        
        /* Sidebar Styling */
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; background: #fff; border-right: 1px solid #dee2e6; z-index: 1000; }
        .nav-link { color: #6c757d; font-weight: 500; border-radius: 6px; margin: 2px 15px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: #000; background: #f1f1f1; }
        
        /* Content Area */
        .main-content { margin-left: var(--sidebar-width); min-height: 100vh; }
        .top-nav { background: #fff; border-bottom: 1px solid #dee2e6; padding: 0.75rem 2rem; }
        
        /* Monochrome Accents */
        .btn-black { background: #000; color: #fff; border-radius: 4px; }
        .btn-black:hover { background: #333; color: #fff; }
        .card { border: 1px solid #e0e0e0; box-shadow: none; border-radius: 8px; }
        .status-pill { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid #000; color: #000; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="sidebar d-flex flex-column py-4">
        <div class="px-4 mb-5">
            <h5 class="fw-bold mb-0"><i class="bi bi-cpu text-dark"></i> LAB ARCHITECT</h5>
            <small class="text-muted">Tech Management v1.0</small>
        </div>
        
        <ul class="nav flex-column mb-auto">
            <li class="nav-item"><a href="(% url 'tech_dashboard' %)" class="nav-link active"><i class="bi bi-grid-fill me-3"></i> Dashboard</a></li>
            <li class="nav-item"><a href="(% url 'assigned_laboratories' %)" class="nav-link"><i class="bi bi-clipboard-check me-3"></i> Work Orders</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-pc-display me-3"></i> Lab Inventory</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-calendar-event me-3"></i> Schedule</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="bi bi-gear me-3"></i> Settings</a></li>
        </ul>

        <div class="mt-auto px-4">
            <a href="#" class="text-decoration-none text-danger small fw-bold"><i class="bi bi-box-arrow-left"></i> LOGOUT</a>
        </div>
    </div>

    <div class="main-content">
        <header class="top-nav d-flex justify-content-between align-items-center">
            <div class="input-group w-25">
                <span class="input-group-text bg-light border-0"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control bg-light border-0 text-small" placeholder="Search Lab resources...">
            </div>
            <div class="d-flex align-items-center gap-3">
                <i class="bi bi-bell text-muted"></i>
                <div class="vr mx-2"></div>
                <small class="fw-bold">Tech Support #02</small>
                <img src="https://ui-avatars.com/api/?name=Admin&background=000&color=fff" class="rounded-circle" width="32" height="32">
            </div>
        </header>

        <main class="p-4">
            {% block content %}{% endblock %}
        </main>
    </div>

</body>
</html>
