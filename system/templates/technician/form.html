{% extends "technician/base.html" %}
{% block content %}

<form method="post">
    {% csrf_token %}

    <!-- Assessment Period -->
    <div class="mb-3">
        <label class="form-label fw-bold">Assessment Period</label>
        <select class="form-select" name="period" required>
            <option value="" disabled {% if not selected_period_id %}selected{% endif %}>
                Select Period
            </option>
            {% for p in periods %}
                <option value="{{ p.id }}" {% if p.id == selected_period_id %}selected{% endif %}>
                    {{ p.semester }} {{ p.school_year }}
                </option>
            {% endfor %}
        </select>
    </div>

    <!-- Laboratory Dropdown (GET, not POST) -->
    <div class="mb-3">
        <label class="form-label fw-bold">Laboratory</label>
        <select class="form-select" name="lab"
            onchange="window.location.href='?lab=' + this.value">
            
            <option value="" disabled {% if not selected_lab_id %}selected{% endif %}>
                Select Laboratory
            </option>

            {% for lab in labs %}
                <option value="{{ lab.id }}" {% if lab.id == selected_lab_id %}selected{% endif %}>
                    {{ lab.room_name }}
                </option>
            {% endfor %}
        </select>
        <small class="text-muted">Selecting a lab will load its units below.</small>
    </div>

    <!-- Unit Dropdown -->
    <div class="mb-3">
        <label class="form-label fw-bold">Unit / Computer</label>
        <select class="form-select" name="unit" required>
            <option value="" disabled {% if not selected_unit_id %}selected{% endif %}>
                Select Unit
            </option>
            {% for unit in units %}
                <option value="{{ unit.id }}" {% if unit.id == selected_unit_id %}selected{% endif %}>
                    {{ unit.asset_tag }}
                </option>
            {% endfor %}
        </select>
    </div>

    <!-- Hardware Condition -->
    <div class="mb-3">
        <label class="form-label fw-bold">Hardware Condition</label>
        <select class="form-select" name="hardware">
            <option value="Good">Good</option>
            <option value="Fair">Fair</option>
            <option value="Poor">Poor</option>
        </select>
    </div>

    <!-- Software Condition -->
    <div class="mb-3">
        <label class="form-label fw-bold">Software Condition</label>
        <select class="form-select" name="software">
            <option value="Up-to-date">Up-to-date</option>
            <option value="Outdated">Outdated</option>
        </select>
    </div>

    <!-- Equipment Status -->
    <div class="mb-3">
        <label class="form-label fw-bold">Equipment Status</label>
        <select class="form-select" name="equip">
            <option value="Good">Good</option>
            <option value="Fair">Fair</option>
            <option value="Poor">Poor</option>
        </select>
    </div>

    <!-- Remarks -->
    <div class="mb-3">
        <label class="form-label fw-bold">Remarks</label>
        <textarea class="form-control" name="remarks" rows="4">{{ request.POST.remarks }}</textarea>
    </div>

    <button type="submit" class="btn btn-dark">Submit Inspection</button>
</form>

{% endblock %}
