<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root { --sidebar-width: 260px; }
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; color: #1a1a1a; }
        
        /* Sidebar Styling */
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; background: #fff; border-right: 1px solid #dee2e6; z-index: 1000; }
        .nav-link { color: #6c757d; font-weight: 500; border-radius: 6px; margin: 2px 15px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: #000; background: #f1f1f1; }
        
        /* Content Area */
        .main-content { margin-left: var(--sidebar-width); min-height: 100vh; }
        .top-nav { background: #fff; border-bottom: 1px solid #dee2e6; padding: 0.75rem 2rem; }
        
        /* Monochrome Accents */
        .btn-black { background: #000; color: #fff; border-radius: 4px; }
        .btn-black:hover { background: #333; color: #fff; }
        .card { border: 1px solid #e0e0e0; box-shadow: none; border-radius: 8px; }
        .status-pill { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid #000; color: #000; padding: 2px 8px; border-radius: 4px; }
        
        .form-select {
            background-color: #fff;
            color: #000;
        }

        .form-select option {
            color: #000;
        }    
            /* Subtle hover effect for list items */
        .hover-bg-light:hover {
            background-color: #fafafa;
        }
        /* Black Button Utility if not in base.html */
        .btn-black {
            background-color: #000;
            color: #fff;
            border: none;
        }
        .btn-black:hover {
            background-color: #333;
            color: #fff;
        }
        .page-link {
            transition: all 0.2s ease;
            box-shadow: none !important;
        }
        .page-link:hover.text-dark {
            background-color: #000 !important;
            color: #fff !important;
            border-color: #000 !important;
    }


    </style>
</head>
<body>

    <div class="sidebar d-flex flex-column py-4">
        <div class="px-4 mb-5">
            <h5 class="fw-bold mb-0"><i class="bi bi-cpu text-dark"></i> LAB TRACK</h5>
            <small class="text-muted">Tech Management v1.0</small>
        </div>
        
        <ul class="nav flex-column mb-auto">
            <li class="nav-item">
                <a href="{% url 'dashboard' %}" 
                class="nav-link {% if request.resolver_match.url_name == 'tech_dashboard' %}active{% endif %}">
                <i class="bi bi-grid-fill me-3"></i> Dashboard
                </a>
            </li>

            <li class="nav-item">
                <a href="{% url 'laboratory' %}" 
                class="nav-link {% if request.resolver_match.url_name == 'assigned_laboratories' %}active{% endif %}">
                <i class="bi bi-clipboard-check me-3"></i> Laboratory
                </a>
            </li>

            <li class="nav-item">
                <a href="{% url 'report' %}" 
                class="nav-link {% if request.resolver_match.url_name == 'inspection_form' %}active{% endif %}">
                <i class="bi bi-pc-display me-3"></i> Report
                </a>
            </li>

            <li class="nav-item">
                <a href="{% url 'technicians' %}" 
                class="nav-link {% if request.resolver_match.url_name == 'inspection_form' %}active{% endif %}">
                <i class="bi bi-pc-display me-3"></i> User Management
                </a>
            </li>

        </ul>

        <div class="mt-auto px-4">
            <a href="{% url 'logout' %}" class="text-decoration-none text-danger small fw-bold">
                <i class="bi bi-box-arrow-left"></i> LOGOUT
            </a>
        </div>
    </div>

    <div class="main-content">
        <header class="top-nav d-flex justify-content-between align-items-center">
            <div class="input-group w-25">
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="vr mx-2"></div>
                <!-- Display logged-in user name -->
                <small class="fw-bold">{{ request.user.get_full_name|default:request.user.username }}</small>
                <!-- Avatar with initials -->
                <img 
                    src="https://ui-avatars.com/api/?name={{ request.user.first_name }}+{{ request.user.last_name }}&background=000&color=fff&rounded=true" 
                    class="rounded-circle" width="32" height="32" alt="User Avatar">
            </div>        
        </header>

        <main class="p-4">
            {% block content %}{% endblock %}
        </main>
    </div>

</body>
</html>
